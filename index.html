<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMIC REVIEW</title>
  <style>
    :root {
      --ink: #191816;
      --paper: #fff4dc;
      --panel: #ffffff;
      --muted: #6f6a60;
      --line: #dfd5c5;
      --red: #ef5b50;
      --cyan: #28a7b8;
      --yellow: #d99016;
      --green: #5da271;
      --shadow: 0 18px 50px rgba(25, 24, 22, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background:
        linear-gradient(90deg, rgba(25, 24, 22, 0.04) 1px, transparent 1px),
        linear-gradient(rgba(25, 24, 22, 0.032) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
    }

    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 44px;
    }

    .topbar {
      margin-bottom: 24px;
    }

    .brand {
      max-width: 900px;
    }

    h1 {
      margin: 0;
      color: var(--red);
      font-size: clamp(28px, 4vw, 50px);
      font-weight: 950;
      line-height: 0.98;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 var(--ink);
    }

    .subtitle {
      max-width: 650px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.75;
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 12px;
      margin-bottom: 22px;
      padding: 14px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .content-layout {
      display: grid;
      grid-template-columns: 154px minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }

    .tag-sidebar {
      position: sticky;
      top: 22px;
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 7px 7px 0 rgba(25, 24, 22, 0.86);
    }

    .tag-sidebar-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .tag-list {
      display: grid;
      gap: 8px;
    }

    .tag-filter {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #fffefa;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      font-weight: 900;
      text-align: left;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .tag-filter:hover {
      transform: translateX(3px);
      background: #fff6d9;
    }

    .tag-filter.is-active {
      background: var(--ink);
      color: #fff;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    input,
    select {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 2px solid var(--ink);
      border-radius: 6px;
      background: #fffefa;
      color: var(--ink);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(40, 167, 184, 0.18);
    }

    .comic-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 36px 30px;
      align-items: start;
      padding: 8px 0 36px;
    }

    .comic-card {
      position: relative;
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      gap: 18px;
      min-height: 226px;
      padding: 16px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 10px 12px 0 rgba(25, 24, 22, 0.86);
      transform: rotate(-1.2deg);
      transform-origin: center;
    }

    .comic-card::after {
      position: absolute;
      top: 12px;
      left: 18px;
      right: 18px;
      height: 1px;
      background: rgba(25, 24, 22, 0.12);
      content: "";
    }

    .comic-card:nth-child(2n) {
      margin-top: 34px;
      transform: rotate(1.1deg);
    }

    .comic-card:nth-child(3n) {
      grid-template-columns: 148px minmax(0, 1fr);
      transform: rotate(-0.7deg);
    }

    .comic-card:nth-child(4n) {
      margin-top: 18px;
      transform: rotate(0.85deg);
    }

    .comic-card:nth-child(5n) {
      margin-top: 8px;
      margin-left: 12px;
      transform: rotate(-1.45deg);
    }

    .cover {
      position: relative;
      min-height: 190px;
      overflow: hidden;
      border: 2px solid var(--ink);
      border-radius: 6px;
      background: var(--cover-color);
      background-position: center;
      background-size: cover;
    }

    .cover.is-placeholder::before {
      position: absolute;
      inset: 10px;
      border: 2px solid rgba(255, 255, 255, 0.82);
      content: "";
    }

    .cover.is-placeholder::after {
      position: absolute;
      right: -23px;
      bottom: 18px;
      width: 92px;
      height: 92px;
      border: 15px solid rgba(25, 24, 22, 0.18);
      border-radius: 50%;
      content: "";
    }

    .cover-title {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.12;
      text-shadow: 2px 2px 0 rgba(25, 24, 22, 0.7);
      word-break: break-word;
    }

    .comic-body {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
    }

    .comic-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .comic-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .rating-pill {
      flex: 0 0 auto;
      min-width: 0;
      color: var(--yellow);
      font-size: 16px;
      font-weight: 900;
      text-align: center;
      text-shadow: 1px 1px 0 rgba(25, 24, 22, 0.38);
      white-space: nowrap;
    }

    .score-block {
      display: grid;
      flex: 0 0 auto;
      gap: 3px;
      justify-items: end;
      padding-top: 3px;
    }

    .star-rating {
      color: var(--yellow);
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      text-shadow: 1px 1px 0 rgba(25, 24, 22, 0.38);
      white-space: nowrap;
    }

    .meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .review {
      margin: 0 0 15px;
      color: #35312b;
      font-size: 15px;
      line-height: 1.68;
      white-space:pre-line;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      padding: 4px 8px;
      border: 1px solid var(--ink);
      border-radius: 999px;
      background: #fff6d9;
      font-size: 12px;
      font-weight: 800;
    }

    .empty {
      display: none;
      padding: 32px;
      border: 2px dashed var(--ink);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      text-align: center;
      font-weight: 800;
    }

    @media (max-width: 820px) {
      .content-layout,
      .controls,
      .comic-grid {
        grid-template-columns: 1fr;
      }

      .tag-sidebar {
        position: static;
        display: block;
        overflow: hidden;
      }

      .tag-sidebar-title {
        margin-bottom: 10px;
      }

      .tag-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: thin;
      }

      .tag-filter {
        width: auto;
        flex: 0 0 auto;
        min-width: 72px;
        text-align: center;
      }

      .tag-filter:hover {
        transform: translateY(-1px);
      }

      .comic-card {
        grid-template-columns: 120px minmax(0, 1fr);
        min-height: 210px;
        width: 97%;
        margin-top: 0;
        transform: rotate(-1.15deg);
      }

      .comic-card:nth-child(2n),
      .comic-card:nth-child(3n),
      .comic-card:nth-child(4n),
      .comic-card:nth-child(5n) {
        grid-template-columns: 120px minmax(0, 1fr);
      }

      .comic-card:nth-child(2n) {
        justify-self: end;
        margin-top: 24px;
        transform: rotate(1.15deg);
      }

      .comic-card:nth-child(3n) {
        justify-self: start;
        width: 94%;
        margin-top: 28px;
        transform: rotate(-0.8deg);
      }

      .comic-card:nth-child(4n) {
        justify-self: end;
        width: 96%;
        margin-top: 24px;
        transform: rotate(0.9deg);
      }

      .comic-card:nth-child(5n) {
        margin-left: 18px;
        transform: rotate(-1.35deg);
      }

      .cover {
        min-height: 178px;
      }
    }

    @media (max-width: 520px) {
      .shell {
        width: min(100% - 22px, 1180px);
        padding-top: 22px;
      }

      h1 {
        font-size: clamp(34px, 12vw, 56px);
        text-shadow: 2px 2px 0 var(--ink);
      }

      .comic-card {
        grid-template-columns: 1fr;
        width: 100%;
      }

      .comic-card:nth-child(2n),
      .comic-card:nth-child(3n),
      .comic-card:nth-child(4n),
      .comic-card:nth-child(5n) {
        grid-template-columns: 1fr;
        width: 100%;
        margin-left: 0;
      }

      .cover {
        min-height: 260px;
      }

      .comic-head {
        align-items: stretch;
        flex-direction: column;
      }

      .rating-pill {
        width: max-content;
        padding-top: 0;
      }

      .score-block {
        justify-items: start;
        padding-top: 0;
      }
    }
  </style>
</head>

    </section>
  </main>

        review: "很遗憾我没看过租借女友，所以在这里你就是第一龟男",
        tags: ["异世界","大份"],
        color: "#35312b"
      },
      {
        title: "中二病也要谈恋爱",
        author: "京都动画 / 虎虎",
        genre: "",
        score: 8.0,
        cover: "pictures/中二病.jpg",
        review: "可惜对眼镜妹无感",
        tags: ["校园","幻想","京都动画"],
        color: "#35312b"
      },
      {
        title: "境界的彼方",
        author: "京都动画 / 鳥居なごむ",
        genre: "",
        score: 6.0,
        cover: "pictures/境界的彼方.jpg",
        review: "完全对眼镜妹无感",
        tags: ["校园","奇幻","京都动画"],
        color: "#35312b"
      },
      {
        title: "超时空辉夜姬！",
        author: "STUDIO CHROMATO",
        genre: "",
        score: 9.8,
        cover: "pictures/超时空辉夜姬！.jpg",
        review: "作画细节和帧数都让我感觉到恐怖，并且剧情也相当不错\n网飞神了，用钱砸死我吧",
        tags: ["奇幻","百合"],
        color: "#35312b"
      }


    ];

    const grid = document.querySelector("#comicGrid");
    const emptyState = document.querySelector("#emptyState");
    const searchInput = document.querySelector("#searchInput");
    const sortSelect = document.querySelector("#sortSelect");
    const tagList = document.querySelector("#tagList");
    let activeTag = "all";

    function formatScore(score) {
      return `${Number(score).toFixed(1)}/10.0`;
    }

    function formatStars(score) {
      const filled = Math.max(0, Math.min(5, Math.round(Number(score) / 2)));
      return "★★★★★".slice(0, filled) + "☆☆☆☆☆".slice(0, 5 - filled);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getCoverMarkup(comic) {
      const title = escapeHtml(comic.title);
      const color = escapeHtml(comic.color || "#ef5b50");

      if (comic.cover) {
        const cover = escapeHtml(comic.cover);
        return `<div class="cover" style="--cover-color: ${color}; background-image: url('${cover}')" role="img" aria-label="${title} 封面"></div>`;
      }

      return `
        <div class="cover is-placeholder" style="--cover-color: ${color}" role="img" aria-label="${title} 封面占位">
          <div class="cover-title">${title}</div>
        </div>
      `;
    }

    function renderCards() {
      const query = searchInput.value.trim().toLowerCase();

      let visible = comics.filter((comic) => {
        const haystack = [comic.title, comic.author, comic.genre, comic.tags.join(" ")].join(" ").toLowerCase();
        const matchesTag = activeTag === "all" || comic.genre === activeTag || comic.tags.includes(activeTag);
        return matchesTag && haystack.includes(query);
      });

      visible.sort((a, b) => {
        if (sortSelect.value === "score-asc") return a.score - b.score;
        if (sortSelect.value === "title-asc") return a.title.localeCompare(b.title, "zh-CN");
        return b.score - a.score;
      });

      grid.innerHTML = visible.map((comic) => `
        <article class="comic-card">
          ${getCoverMarkup(comic)}
          <div class="comic-body">
            <div>
              <div class="comic-head">
                <h2>${escapeHtml(comic.title)}</h2>
                <div class="score-block" aria-label="${formatScore(comic.score)}，${formatStars(comic.score)}">
                  <div class="rating-pill">${formatScore(comic.score)}</div>
                  <div class="star-rating" aria-hidden="true">${formatStars(comic.score)}</div>
                </div>
              </div>
              <p class="meta">${escapeHtml(comic.author)}</p>
              <p class="review">${escapeHtml(comic.review)}</p>
            </div>
            <div class="tags">${comic.tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
          </div>
        </article>
      `).join("");

      emptyState.style.display = visible.length ? "none" : "block";
    }

    function renderTagSidebar() {
      const tags = ["all", ...new Set(comics.flatMap((comic) => [comic.genre, ...comic.tags]))];
      tagList.innerHTML = tags.map((tag) => {
        const label = tag === "all" ? "全部" : tag;
        const activeClass = tag === activeTag ? " is-active" : "";
        return `<button class="tag-filter${activeClass}" type="button" data-tag="${escapeHtml(tag)}">${escapeHtml(label)}</button>`;
      }).join("");
    }

    tagList.addEventListener("click", (event) => {
      const button = event.target.closest(".tag-filter");
      if (!button) return;

      activeTag = button.dataset.tag;
      renderTagSidebar();
      renderCards();
    });

    [searchInput, sortSelect].forEach((control) => {
      control.addEventListener("input", renderCards);
      control.addEventListener("change", renderCards);
    });

    renderTagSidebar();
    renderCards();
  </script>
</body>
</html>
